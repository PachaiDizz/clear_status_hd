name: purestatus_clone
description: Clear Status - Share HD Photos & Videos to WhatsApp Status
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Media picking
  image_picker: ^1.1.2
  photo_manager: ^3.3.0

  # Video processing / compression
  ffmpeg_kit_flutter_new: ^4.1.0
  
  # Image compression
  flutter_image_compress: ^2.3.0

  # File handling
  path_provider: ^2.1.4
  path: ^1.9.0

  # Share / WhatsApp integration
  share_plus: ^10.1.4

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.3

  # Permissions
  permission_handler: ^11.3.1

  # Video player preview
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  get: ^4.6.6
  get_storage: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
