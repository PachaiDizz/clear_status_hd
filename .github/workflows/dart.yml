name: iOS Build
on:
  push:
    branches: [main]
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
      - name: Generate iOS folder
        run: flutter create --platforms=ios .
      - name: Fix iOS deployment target
        run: |
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '14.0'/" ios/Podfile
      - name: Install dependencies
        run: flutter pub get
      - name: Pod install
        run: cd ios && pod install
      - name: Build IPA
        run: flutter build ios --release --no-codesign
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
