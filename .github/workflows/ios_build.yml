name: iOS Build
on:
  push:
    branches: [main]
jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Copy Podfile
        run: cp ios_podfile/Podfile ios/Podfile

      - name: Install dependencies
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install

      - name: Find -G flag source        # ← ADD THIS
        run: |
          echo "=== xcconfig files with -G ==="
          grep -r "\-G" ios/Pods --include="*.xcconfig" -l 2>/dev/null || echo "none in xcconfig"
          echo "=== pbxproj with -G ==="
          grep -r "\-G" ios/Pods --include="*.pbxproj" -l 2>/dev/null || echo "none in pbxproj"
          echo "=== All -G occurrences ==="
          grep -r "\-G" ios/ -l 2>/dev/null | head -20

      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/Runner.app
          cd build/ios
          zip -qr StatusHD.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StatusHD
          path: build/ios/StatusHD.ipa

          